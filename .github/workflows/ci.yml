name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  check:
    name: Syntax and integrity checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Setup npm
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Generate static site
        env:
          NUXT_APP_BASE_URL: /Web002-Space/
        run: npm run generate

      - name: Validate generated artifact
        run: |
          set -euo pipefail
          test -f .output/public/index.html
          test -f .output/public/api/router.json
          test -f .output/public/cosmic-broth/records/yuzhoutang/c1/index.html
          test -f .output/public/meta-room/images/chessboard/index.html
          grep -q '/Web002-Space/_nuxt/' .output/public/index.html
