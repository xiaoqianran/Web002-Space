board":14274},{"id":14275,"name":14275},"chessboard",{"cosmic-broth":14277,"checkerboard":14290,"fogbound-box":14303,"meta-room":14315},{"records":14278,"portraits":14282,"images":14286},{"yuzhoutang":14279},{"image_url":14280,"introduce":14281},"/assets/0771_C5638_FE_611584_F27_B8_E6_ECADDEA_4_1_a9c3acc703.png","收录了小说宇宙汤正篇之外的一些碎片化写作。它们介绍了一些万星宇宙的风土人情。于不同的视觉展现这个世界。这真是个差劲的宇宙，不是吗。但是，纵使环境如此，你也要改变吗，你也要得到吗，你的梦想是什么，你愿意为此付出多少——以支持你的追求，响彻宇宙。",{"database":14283},{"image_url":14284,"introduce":14285},"/assets/IMG_3795_20250817_152046_e4d8a513de.PNG","Ray的人员档案库。它进行尽责的记录着所见到的每一个人。\n硅基将可查询范围内的知识集称之为”智能沼泽“或者”智池“，如果有人类的思想创意能够超出智池范畴，其发言会被硅基们奉为圭臬，并汲取，记录。阅读大量失落媒体或失传纸质图书的人，创造性的艺术家，富有想象力的作者……而然，有学者发现，还有一类人容易被硅基记录在案——富有创意的抽象的弱智。",{"vlog":14287},{"image_url":14288,"introduce":14289},"/assets/IMG_3795_20250817_152103_1d28859e0f.PNG","宇宙飞船GRAND-STARRS-RAY.som认真地记录着所见所闻。\nray是一种纳米级的硅基生命，可以拟态各种材质，也可以拆解大部分的材料。曾在母星[9C-71V-levels]上被星球上的人类作为城市的建材使用。在levels星球上，ray构成了多个类似地壳的层级，形成了重层的大陆景观。Ray具有记录，监控，构建城市建筑的功能。通过ray，星球的政府可以控制、监控城市的所有角落。它们的制造者是levels星球上的宏星安保公司。ray的名字就是公司的订购产品的网站。公司赋予了Ray“奉行绝对的效率，不浪费能量”的使命。在待机状态时，它们通常会以松散的白色细沙的状态存在。它们想方设法节能。如果没有要求，它们不会为飞船做涂装，也不会制造任何家具。幸好，记录不需要消耗太多能源。\n\n",{"records":14291,"portraits":14295,"images":14299},{"fate":14292},{"image_url":14293,"introduce":14294},"/assets/QQ_20251007215000_fe6312b28f.png","繁育之主与门之钥的文字游戏。他们二人决定了一个家族的命数，最后，家族的最后一人登上了绞刑架。谁是这场游戏的真正的胜利者？这场游戏恰好成为了双子诞生的序章。",{"dreamer":14296},{"image_url":14297,"introduce":14298},"/assets/QQ_20251007212745_26999319e8.jpg","幻想者，不仅仅意味着棋盘之上的假想，可能性的存在。也代表着游戏中的开拓者——有着大目标，大梦想的人。在地平世界的地图中开疆拓土的冒险者们，何尝不是屹立于现实中的造梦者。",{"maps":14300},{"image_url":14301,"introduce":14302},"/assets/03_36f7eeb99d.jpg","棋盘上，沙盘中，芸芸众生不过是被概念推动的游戏棋子，而自我意识和自主的选择不过是微小生命的幻梦一场。欢迎来到地平世界（扁平的世界）——在这里，你可以窥见众神游戏箱里的众生之梦。",{"records":14304,"portraits":14308,"images":14311},{"Sevener":14305},{"image_url":14306,"introduce":14307},"/assets/IMG_5763_20250814_125823_b24f739c38.PNG","基于黑日企划设定进行二次创作的小说，小春（哈鲁）和甘明子（卡梅兹）跟随勇火教团的火行者小队，进入一座名为帕维纳的城池，探寻帕维纳与外界丧失联系的真相。这座小城曾多次易主，累累战争之下，苍白的亡魂沉默的驻守精神的边界……在天灾面前，你愿意成为癫狂的乌合之众，还是理智尚存，固守不群的体面？",{"rumor":14309},{"image_url":6593,"introduce":14310},"fogbound-box，在独立运行的世界中，总有人脱颖而出。芸芸众生中，总有那么一些人成就了时代。他们留下了属于自己的传说，他们的故事口口相传，趋于不朽。在此介绍传闻中的人物，英雄，或者……祸端。",{"darkroom":14312},{"image_url":14313,"introduce":14314},"/assets/IMG_5631_20250817_150358_af257b52ff.PNG","fogbound-box，透过箱子的观察孔，你看到了一些场景的碎片。它可能来自黑日之下的冒险，可能来自被千年虫蛀穿的后千禧年。",{"records":14316,"portraits":14325,"images":14329},{"goldfish":14317,"guovssahas":14320,"sickday":14323},{"image_url":14318,"introduce":14319},"/assets/1_249ebafb49.jpg","一个简短的校园小故事：惊喜之余，你拆开包装，看到了那份礼物。能活着就已经足够幸运了，你还打算奢求些什么呢？这个故事隶属于1001故事集的主时间线。是主线的第一篇故事。",{"image_url":14321,"introduce":14322},"/assets/_d10ebd4745.jpg","“汝闻人籁而未闻地籁，汝闻地籁而未闻天籁夫！”，狭义上，《齐物论》中的“天籁”是一种起源，可以浅显理解为风声。这个故事隶属于1001故事集的主时间线。是该系列的第二篇故事。",{"image_url":10259,"introduce":14324},"Sick for a day，病栋一日。“无色小姐，不用紧张，入院证明办理完毕，现在，你已经算是这里的一员了。”白医生对无色说道。比突然成为精神病院的一员更糟的是，自己好像真的有精神病要治。无色发现自己忘记了很多东西，但是，自己真的应该想起来吗？究竟什么能定义人是人，什么能定义，她是无色呢？",{"Chessmen":14326},{"image_url":14327,"introduce":14328},"/assets/20220513_D_25b2665ffa.jpg","置于COC背景下的诸神的桌游社团。位于幻梦境和现实的狭缝之间，配备了KP，骰子，现实沙盘和温馨的装潢，众神在此进行着永无止境的跑团游戏。\n棋盘室的屋顶是无数悬浮的星球模型构成的星空，正中的桌上摆放着投射现实的沙盘。现实中的景物会以沙盘中的拟真玩具显现。（类似微缩景观）智慧生物则以棋子的样子呈现。棋盘室家具风格会配合沙盘的时代背景进行改变。\n棋盘室的主人是骰子和KP，这对聪慧的双子在上层叙事游戏中持续接受挑战。除此之外，他们也是专业且敬业的工作人员：请遵守他们的游戏规则。",{"chessboard":14330},{"image_url":14331,"introduce":14332},"/assets/2_c29dd5493e.jpg","幻梦境之影棋盘室：\n开辟在幻梦境和现世的缝隙里的房间，双子的桌游室。\n对于误入其中的人类，值得注意的是以下规则：\n1.这里是名为幻梦境之影的房间。你已经脱离了现实。当你来到此处，意味着代表你本人的棋子被拿出棋盘。请不要把你的其他同胞拿出沙盘，除非你想再拖几人下水。\n2.你需要赢得游戏，否则就要留下灵魂。\n3.你可以相信骰娘和kp的公正。但是也不用怀疑他们的恶意。\n4.关于幻梦境之影的社团玩家……\n   4-1骰娘和kp是游戏高手，他们很有胜负欲，更何况是和一块小点心决一死战。\n  4-2你就是被“作家”扔出沙盘的。\n  4-3名为“灵感”的玩家会ob每一局游戏。他没有棋子，他会随机推动任何棋子的行动。他是所有棋盘的不确定因素。\n  4-4GM生态箱并不是一个好的选择。我向你保证。物竞天择，适者生存是世界上最残酷的法则。\n5.请享受你的跑团游戏。珍惜你接触到的棋子，欸，不是说了吗，不要将棋子拿出棋盘，碎片也不要，毕竟尸体很占地方。",{"cosmic-broth":14334,"checkerboard":14340,"fogbound-box":14345,"meta-room":14355},{"records":14335,"portraits":14338,"images":14339},{"yuzhoutang":14336},[14337]
